server {
  listen 80;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # /api/* → backend, préfixe retiré (/api/reports → /reports).
  # Cette règle vit ici (et non dans le reverse-proxy) pour que la stack soit
  # agnostique de la façade : Caddy, Nginx Proxy Manager ou Traefik n'ont alors
  # qu'un seul upstream à connaître pour le domaine applicatif.
  location /api/ {
    # Résolveur Docker + upstream en variable : nginx ne résout pas `api` au
    # démarrage (il planterait si l'API n'est pas encore up) et ne met pas son
    # IP en cache à vie (l'API peut redémarrer et changer d'IP).
    resolver 127.0.0.11 valid=10s;
    set $api_upstream api:8000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$api_upstream;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
