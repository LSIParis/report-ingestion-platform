# ============================================================================
# Stack PORTAINER — service MTA-STS (politiques de chiffrement du courrier entrant).
#
# Volontairement SÉPARÉE de la stack dmarc-reports : ce service n'a aucun lien avec la
# plateforme de rapports. Il ne doit ni tomber avec elle, ni la faire tomber — et une
# politique MTA-STS injoignable dégrade la sécurité du mail, ce n'est pas anodin.
#
# Déploiement (mode Repository) :
#   Repository URL : https://github.com/LSIParis/report-ingestion-platform
#   Compose path   : infra/mta-sts/stack.yml
#
# Aucun port publié : le service rejoint le réseau du reverse-proxy (NPM), qui termine
# le TLS. Les politiques sont EMBARQUÉES DANS L'IMAGE — sur un endpoint agent, un
# bind-mount depuis le dépôt cloné ne fonctionne pas (le dépôt vit sur le serveur
# Portainer, pas sur l'hôte Docker).
#
# Dans NPM, un Proxy Host par domaine servi :
#   mta-sts.<domaine>  ->  http://mta-sts:80   + certificat Let's Encrypt
# ============================================================================
services:
  mta-sts:
    image: ghcr.io/lsiparis/mta-sts:latest
    restart: unless-stopped
    networks:
      proxy:
        aliases: [mta-sts]

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
