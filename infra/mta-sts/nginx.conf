# Sert la politique MTA-STS de chaque domaine, sur https://mta-sts.<domaine>/.well-known/mta-sts.txt
#
# Exigences de la RFC 8461 respectées ici :
#  - Content-Type: text/plain (sinon la politique est ignorée) ;
#  - AUCUNE redirection sur le chemin de la politique (un 301 invalide la récupération) ;
#  - le domaine est déduit du Host, pas d'un chemin : un même conteneur sert tous les
#    domaines, et un Host inconnu retourne 404 plutôt qu'une politique d'un autre domaine.

map $host $sts_domain {
    default                    "";
    "~^mta-sts\.(?<d>.+)$"     $d;
}

server {
    listen 80 default_server;
    server_name _;

    # Le nom du fichier vient du Host : mta-sts.exemple.com -> /srv/policies/exemple.com.txt
    # Domaine non servi -> le fichier n'existe pas -> 404. Jamais la politique d'un autre.
    location = /.well-known/mta-sts.txt {
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "public, max-age=600" always;
        alias /srv/policies/$sts_domain.txt;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 404;
    }
}
