# ============================================================================
# Stack PORTAINER — derrière un reverse-proxy EXISTANT (Nginx Proxy Manager,
# Traefik…) qui occupe déjà 80/443. Aucun port n'est publié sur l'hôte.
#
# Déploiement (mode Repository) :
#   Repository URL : https://github.com/LSIParis/report-ingestion-platform
#   Compose path   : infra/portainer-stack.npm.yml
#
# Images tirées depuis GHCR (build par .github/workflows/build-images.yml).
#
# Réseaux :
#  - `internal` (privé, non exposé) : postgres, redis, minio, clamav, api, worker…
#  - `proxy` (EXTERNE, celui de NPM) : seuls `frontend` et `minio` y sont exposés,
#    sous les alias `reports-frontend` et `reports-minio` pour éviter toute
#    collision de noms avec les autres stacks partageant ce réseau.
#
# À configurer dans NPM, deux Proxy Hosts :
#   DOMAIN        → http://reports-frontend:80   (le nginx du front route /api/* vers l'API)
#   FILES_DOMAIN  → http://reports-minio:9000    (NPM conserve le Host par défaut :
#                                                 indispensable, sinon la signature
#                                                 SigV4 des URLs présignées casse)
# ============================================================================
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_DB: reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # PAS de bind-mount de init-roles.sql ici : sur un endpoint AGENT, le dépôt cloné
      # vit sur le serveur Portainer, pas sur l'hôte Docker → Docker créerait un
      # répertoire vide. Les rôles sont créés par `migrate` (scripts/ensure_roles.py).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 12
      # initdb prend plusieurs dizaines de secondes au 1er démarrage : sans start_period,
      # Compose déclare le conteneur unhealthy avant la fin de l'initialisation et
      # abandonne le déploiement des services qui en dépendent.
      start_period: 90s

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    networks:
      internal:
      proxy:
        aliases: [reports-minio]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 12
      start_period: 30s

  createbuckets:
    image: minio/mc
    networks: [internal]
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/reports-raw;
      exit 0;"

  redis:
    image: redis:7
    restart: unless-stopped
    networks: [internal]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    networks: [internal]
    volumes:
      - clamavdb:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  migrate:
    image: ghcr.io/lsiparis/report-api:latest
    # Le webhook de deploiement re-clone `main` et rejoue `docker compose up`, mais ne
    # re-tire PAS les images :latest -- il reutilise l'image locale (perimee). Sans
    # `pull_policy: always`, un nouveau code pousse sur :latest mais le conteneur reste
    # fige sur l'ancien. Force le pull a chaque redeploiement, sur tous les services GHCR.
    pull_policy: always
    # 1) rôles de connexion (app_api NOBYPASSRLS, app_worker BYPASSRLS)
    # 2) schéma + RLS. Les deux sont idempotents et rejoués à chaque déploiement.
    command: sh -c "python -m scripts.ensure_roles && alembic upgrade head"
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL_MIGRATE: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/reports
      APP_API_PASSWORD: ${APP_API_PASSWORD}
      APP_WORKER_PASSWORD: ${APP_WORKER_PASSWORD}

  api:
    image: ghcr.io/lsiparis/report-api:latest
    pull_policy: always
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    # L'API rejoint le réseau du proxy pour servir /.well-known/mta-sts.txt : NPM y
    # envoie les hôtes mta-sts.<domaine>. Le reste de l'API reste protégé par le
    # middleware — seule cette route (et /health, /auth/login) est publique.
    networks:
      internal:
      proxy:
        aliases: [reports-api]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      DATABASE_URL_API: postgresql://app_api:${APP_API_PASSWORD}@postgres:5432/reports
      DATABASE_URL_WORKER: postgresql://app_worker:${APP_WORKER_PASSWORD}@postgres:5432/reports
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: https://${FILES_DOMAIN}
      S3_BUCKET: reports-raw
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # PEM encodés en base64 : Portainer stocke les variables dans un stack.env
      # (une ligne par variable), donc une valeur multiligne y est impossible.
      JWT_PUBLIC_KEY_B64: ${JWT_PUBLIC_KEY_B64}
      JWT_PRIVATE_KEY_B64: ${JWT_PRIVATE_KEY_B64}
      # Procédure d'ajout d'un domaine : l'API doit connaître la boîte de collecte pour
      # vérifier que les rapports d'un domaine pointent bien vers ELLE. On passe
      # IMAP_USER (et non un réglage séparé) pour que la boîte annoncée aux clients ne
      # puisse pas diverger de celle qu'on relève réellement.
      COLLECTION_MAILBOX: ${IMAP_USER}
      # Les rapports TLS arrivent dans une boîte DISTINCTE de celle des rapports DMARC :
      # deux flux, deux enregistrements DNS. Les confondre publie un enregistrement
      # d'apparence correcte qui envoie les rapports au mauvais endroit.
      TLSRPT_MAILBOX: ${TLSRPT_MAILBOX:-}
      MTA_STS_IP: ${MTA_STS_IP:-}
      SENTRY_DSN: ${SENTRY_DSN:-}

  worker:
    image: ghcr.io/lsiparis/report-api:latest
    pull_policy: always
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info --concurrency 4
    # L'image report-api porte un HEALTHCHECK HTTP (GET :8000/health) pense pour l'API.
    # Ce service ne sert aucun port : sans ce disable, Docker le marque unhealthy en
    # boucle alors qu'il tourne parfaitement — un faux negatif qui masque les vrais.
    healthcheck: { disable: true }
    networks: [internal]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      clamav: { condition: service_started }
    environment:
      DATABASE_URL_API: postgresql://app_api:${APP_API_PASSWORD}@postgres:5432/reports
      DATABASE_URL_WORKER: postgresql://app_worker:${APP_WORKER_PASSWORD}@postgres:5432/reports
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: https://${FILES_DOMAIN}
      S3_BUCKET: reports-raw
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ANTIVIRUS_ENABLED: "true"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      # Alertes. Le webhook est OPTIONNEL : vide, aucune notification n'est envoyee, mais
      # les alertes s'ouvrent quand meme en base et restent visibles sur la page Alertes.
      # Les seuils ont des valeurs par defaut raisonnables ; ne les surcharger qu'au besoin.
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_SILENCE_DAYS: ${ALERT_SILENCE_DAYS:-4}
      ALERT_ONBOARDING_GRACE_DAYS: ${ALERT_ONBOARDING_GRACE_DAYS:-7}
      ALERT_TLS_WINDOW_DAYS: ${ALERT_TLS_WINDOW_DAYS:-7}
      # Canal d'alerte : "desk365" cree un ticket helpdesk au lieu de poster un webhook.
      ALERT_CHANNEL: ${ALERT_CHANNEL:-webhook}
      # La cle API Desk365 est un SECRET (variable d'environnement de la stack, jamais
      # committee). Les autres parametres ont des defauts (voir app/config.py).
      DESK365_API_KEY: ${DESK365_API_KEY:-}
      DESK365_BASE_URL: ${DESK365_BASE_URL:-https://lsi-maintenance.desk365.io/apis/v3}

  # Ordonnanceur des alertes. INDISPENSABLE : un domaine silencieux (ou qui n'a jamais
  # rapporte) ne produit AUCUN evenement -- on ne peut pas reagir a ce qui n'arrive pas.
  # Sans ce service, seules les alertes TLS (declenchees a l'ingestion) fonctionneraient ;
  # `domain_silent` et `never_reported` ne se leveraient jamais.
  beat:
    image: ghcr.io/lsiparis/report-api:latest
    pull_policy: always
    restart: unless-stopped
    # `/app` appartient a root dans l'image (COPY avant USER appuser) : le conteneur tourne
    # en appuser, qui ne peut pas y ecrire le fichier de planification. `/tmp` est le seul
    # repertoire inscriptible -- Beat n'a besoin d'aucune persistance (le planning est
    # declare dans le code, pas lu depuis ce fichier).
    command: celery -A app.celery_app beat -l info -s /tmp/celerybeat-schedule
    healthcheck: { disable: true }      # ordonnanceur, aucun port : voir le worker
    networks: [internal]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    environment:
      REDIS_URL: redis://redis:6379/0

  imap-worker:
    image: ghcr.io/lsiparis/report-api:latest
    pull_policy: always
    restart: unless-stopped
    command: python -m app.workers.imap_worker
    healthcheck: { disable: true }      # releve IMAP, aucun port : voir le worker
    networks: [internal]
    depends_on:
      migrate: { condition: service_completed_successfully }
      minio: { condition: service_healthy }
    environment:
      DATABASE_URL_API: postgresql://app_api:${APP_API_PASSWORD}@postgres:5432/reports
      DATABASE_URL_WORKER: postgresql://app_worker:${APP_WORKER_PASSWORD}@postgres:5432/reports
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: reports-raw
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      IMAP_HOST: ${IMAP_HOST}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}

  frontend:
    image: ghcr.io/lsiparis/report-frontend:latest
    pull_policy: always
    restart: unless-stopped
    networks:
      internal:
      proxy:
        aliases: [reports-frontend]
    depends_on: [api]

networks:
  internal:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}

volumes:
  pgdata:
  miniodata:
  redisdata:
  clamavdb:
