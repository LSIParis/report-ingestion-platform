services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-roles.sql:/docker-entrypoint-initdb.d/init-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/reports-raw;
      exit 0;"

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  migrate:
    build: ../backend
    command: alembic upgrade head
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL_MIGRATE: postgresql://postgres:postgres@postgres:5432/reports

  api:
    build:
      context: ../backend
      target: dev          # pytest + ruff : la stack locale sert aussi à tester
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL_API: postgresql://app_api:app_api@postgres:5432/reports
      DATABASE_URL_WORKER: postgresql://app_worker:app_worker@postgres:5432/reports
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: reports-raw
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
    ports: ["8000:8000"]

  worker:
    build: ../backend
    command: celery -A app.celery_app worker -l info
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL_API: postgresql://app_api:app_api@postgres:5432/reports
      DATABASE_URL_WORKER: postgresql://app_worker:app_worker@postgres:5432/reports
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: reports-raw

  imap-worker:
    build: ../backend
    command: python -m app.workers.imap_worker
    depends_on:
      migrate: { condition: service_completed_successfully }
    environment:
      DATABASE_URL_API: postgresql://app_api:app_api@postgres:5432/reports
      DATABASE_URL_WORKER: postgresql://app_worker:app_worker@postgres:5432/reports
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: reports-raw
      IMAP_HOST: ${IMAP_HOST}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}

  frontend:
    build: ../frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports: ["5173:5173"]
    depends_on: [api]

volumes:
  pgdata:
  miniodata:
